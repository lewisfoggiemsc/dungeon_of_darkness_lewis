name: PR Scan Safe

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: security-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TRIVY_CACHE_DIR: /tmp/trivy-cache

jobs:
  security_scan:
    name: Full Trivy Repository Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}-${{ hashFiles('**/go.mod', '**/go.sum', '**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Vulnerability/Secrets/Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          scanners: vuln,config,secret

      - name: Run License Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-license-results.json
          scanners: license
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}

      - name: Summarize Scan Results
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          # Initialize the summary file
          echo "### 🛡️ Security Scan Results" > pr_summary.md
          echo "" >> pr_summary.md

          if [ -f trivy-results.json ]; then
            TOTAL=$(jq '[.Results[] | ((.Vulnerabilities // []) + (.Misconfigurations // []) + (.Secrets // []))] | flatten | length' trivy-results.json || echo 0)
            CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json || echo 0)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json || echo 0)
            MED=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json || echo 0)
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results.json || echo 0)
            MIS=$(jq '[.Results[]?.Misconfigurations[]?] | length' trivy-results.json || echo 0)
            SECRETS=$(jq '[.Results[]?.Secrets[]?] | length' trivy-results.json || echo 0)

            echo "| Type | Severity | Count |" >> pr_summary.md
            echo "|------|----------|-------|" >> pr_summary.md
            echo "| Vulnerabilities | Critical | $CRIT |" >> pr_summary.md
            echo "| Vulnerabilities | High | $HIGH |" >> pr_summary.md
            echo "| Vulnerabilities | Medium | $MED |" >> pr_summary.md
            echo "| Vulnerabilities | Low | $LOW |" >> pr_summary.md
            echo "| Misconfigurations | - | $MIS |" >> pr_summary.md
            echo "| Secrets | - | $SECRETS |" >> pr_summary.md
            echo "| **Total Issues** | - | **$TOTAL** |" >> pr_summary.md
            echo "" >> pr_summary.md

            echo "- **Scan Time:** $(date -u)" >> pr_summary.md
            echo "- **Branch:** ${HEAD_REF}" >> pr_summary.md
            echo "- **Repository:** ${REPO}" >> pr_summary.md
            echo "" >> pr_summary.md

            if [ "$TOTAL" -eq 0 ]; then
              echo "**✅ No issues found. Repository is secure.**" >> pr_summary.md
            else
              echo "**⚠️ $TOTAL issues found. Please review the results.**" >> pr_summary.md
            fi
          else
            echo "❌ **Scan failed: trivy-results.json not found**" >> pr_summary.md
          fi

          # Output to Step Summary for immediate visibility in Actions tab
          cat pr_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Save PR info
        run: echo ${{ github.event.pull_request.number }} > pr_number.txt

      - name: Upload Scan Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: |
            pr_summary.md
            pr_number.txt
          retention-days: 1
