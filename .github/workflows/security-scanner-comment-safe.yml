name: PR Commenter

on:
  workflow_run:
    workflows: ["PR Scan Safe"]
    types:
      - completed

jobs:
  post_comment:
    name: Post Scan Results to PR
    runs-on: ubuntu-latest
    # Only run if the scan workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    
    permissions:
      pull-requests: write

    steps:
      - name: Download Scan Results Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-scan-results
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Post PR Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Read the PR number saved in the artifact
          PR_NUMBER=$(cat pr_number.txt)
          
          # Check if the summary file exists
          if [ -f pr_summary.md ]; then
            # Post the content of pr_summary.md as a comment
            gh pr comment "$PR_NUMBER" --body-file pr_summary.md
          else
            echo "Summary file not found, skipping comment."
            exit 1
          fi
